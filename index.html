<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜一下 不迷路</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 50%, #ff9a5f 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', 'Microsoft YaHei', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(255,215,150,0.4) 0%, transparent 60%),
                        radial-gradient(circle at 80% 70%, rgba(255,160,80,0.3) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .datetime {
            margin-bottom: 40px;
        }

        .time {
            font-size: 72px;
            font-weight: 700;
            letter-spacing: 4px;
            font-family: 'JetBrains Mono', monospace;
            color: #b3410e;
            text-shadow: 2px 2px 4px rgba(255,200,120,0.5);
        }

        .date {
            font-size: 18px;
            margin-top: 8px;
            letter-spacing: 1px;
            color: #b54312;
        }

        .search-container {
            margin-bottom: 50px;
        }

        .search-box {
            display: flex;
            justify-content: center;
            gap: 0;
            background: rgba(255, 245, 220, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 4px;
            max-width: 600px;
            margin: 0 auto;
            border: 1px solid rgba(255, 180, 70, 0.5);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .search-box:focus-within {
            border-color: #f0a04b;
            box-shadow: 0 0 0 3px rgba(240, 160, 75, 0.2);
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            outline: none;
            font-family: 'JetBrains Mono', monospace;
            color: #5a2d0a;
        }

        .search-box input::placeholder {
            color: #c28144;
            font-family: 'Segoe UI', sans-serif;
        }

        .search-box button {
            background: rgba(230, 150, 60, 0.5);
            border: none;
            padding: 0 24px;
            border-radius: 48px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s;
            color: #5a2d0a;
        }

        .search-box button:hover {
            background: rgba(210, 120, 40, 0.7);
            color: #3d1c04;
        }

        .engine-selector {
            margin-top: 12px;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .engine-btn {
            background: rgba(255, 235, 190, 0.5);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 180, 70, 0.5);
            padding: 6px 16px;
            border-radius: 32px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            color: #b3410e;
        }

        .engine-btn.active {
            background: rgba(210, 120, 40, 0.6);
            border-color: #e09040;
            color: #fff0da;
        }

        .engine-btn:hover:not(.active) {
            background: rgba(230, 160, 70, 0.4);
        }

        .card {
            background: rgba(255, 245, 220, 0.3);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 32px 24px;
            margin: 40px auto 0;
            border: 1px solid rgba(255, 180, 70, 0.3);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-bottom: 30px;
        }

        .tab-btn {
            background: rgba(255, 235, 190, 0.5);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 180, 70, 0.4);
            padding: 8px 20px;
            border-radius: 32px;
            cursor: pointer;
            font-size: 13px;
            color: #b3410e;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn.active {
            background: rgba(210, 120, 40, 0.6);
            border-color: #e09040;
            color: #fff0da;
        }

        .delete-tab {
            background: rgba(0,0,0,0.2);
            border: none;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 12px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: inherit;
        }

        .delete-tab:hover {
            background: rgba(255,100,100,0.8);
            color: white;
        }

        .add-tab {
            background: rgba(210, 120, 40, 0.4);
            border: 1px dashed rgba(255, 180, 70, 0.6);
            padding: 8px 20px;
            border-radius: 32px;
            cursor: pointer;
            font-size: 13px;
            color: #b3410e;
        }

        .shortcuts {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 20px;
            justify-items: center;
            align-items: center;
        }

        .shortcut {
            background: rgba(255, 245, 220, 0.6);
            backdrop-filter: blur(8px);
            padding: 12px 8px;
            border-radius: 20px;
            text-decoration: none;
            transition: all 0.2s;
            border: 1px solid rgba(255, 180, 70, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            color: #b3410e;
            width: 100%;
            min-width: 100px;
        }

        .shortcut:hover {
            transform: translateY(-4px);
            background: rgba(255, 235, 190, 0.8);
            border-color: #f0a04b;
        }

        .shortcut-name {
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .edit-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
        }

        .edit-btn {
            background: rgba(210, 120, 40, 0.8);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 180, 70, 0.6);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 17px;
            cursor: pointer;
            color: #fff0da;
            font-weight: bold;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .edit-btn:hover {
            transform: scale(1.05);
            background: rgba(190, 100, 30, 0.9);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            width: 550px;
            max-width: 90%;
            max-height: 85vh;
            background: rgba(255, 245, 220, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 24px;
            overflow-y: auto;
            border: 1px solid rgba(255, 180, 70, 0.6);
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 600;
            color: #b3410e;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #b3410e;
        }

        .link-item {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            align-items: center;
        }

        .link-item input {
            flex: 1;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 14px;
            background: rgba(255, 245, 220, 0.8);
            border: 1px solid rgba(255, 180, 70, 0.5);
            color: #5a2d0a;
            outline: none;
        }

        .link-item input:focus {
            border-color: #f0a04b;
        }

        .delete-link {
            background: rgba(200, 80, 40, 0.7);
            border: none;
            padding: 8px 12px;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            font-size: 12px;
        }

        .add-link {
            background: rgba(70, 150, 80, 0.7);
            border: none;
            padding: 10px 16px;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
            font-size: 14px;
        }

        .save-links {
            background: rgba(210, 120, 40, 0.8);
            border: none;
            padding: 12px 20px;
            border-radius: 32px;
            color: white;
            cursor: pointer;
            width: 100%;
            margin-top: 16px;
            font-size: 16px;
            font-weight: 600;
        }

        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: #b3410e;
        }

        .footer a {
            color: #b3410e;
            text-decoration: none;
        }

        .footer a:hover {
            color: #8b3a0c;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="datetime">
        <div class="time" id="time">--:--:--</div>
        <div class="date" id="date">----年--月--日</div>
    </div>

    <div class="search-container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索或输入网址..." autofocus>
            <button id="searchBtn">搜索</button>
        </div>
        <div class="engine-selector" id="engineSelector">
            <button class="engine-btn" data-engine="bing">必应</button>
            <button class="engine-btn" data-engine="google">谷歌</button>
            <button class="engine-btn" data-engine="360">360搜索</button>
            <button class="engine-btn" data-engine="baidu">百度</button>
            <button class="engine-btn" data-engine="zhihu">知乎</button>
            <button class="engine-btn" data-engine="sougou">搜狗</button>
        </div>
    </div>

    <div class="card">
        <div id="tabsContainer" class="tabs"></div>
        <div id="panesContainer"></div>
    </div>

    <div class="footer">
        <span>© Copyright @爱玩批处理的cmd(B站) 2026</span>
        <span style="margin:0 8px">|</span>
        <span> 搜一下 不迷路</span>
    </div>
</div>

<div class="edit-panel">
    <button class="edit-btn" id="editBtn">✏️</button>
</div>

<div class="modal" id="editModal">
    <div class="modal-content">
        <div class="modal-header">
            <span class="modal-title">编辑快捷链接</span>
            <button class="close-modal" id="closeModalBtn">&times;</button>
        </div>
        <div id="linksEditor"></div>
        <button class="save-links" id="saveLinksBtn">保存</button>
    </div>
</div>

<script>
    let currentEngine = localStorage.getItem('searchEngine') || 'bing';
    let tabGroups = JSON.parse(localStorage.getItem('tabGroups') || '{"默认": []}');
    let currentTab = localStorage.getItem('currentTab') || '默认';
    
    const defaultLinks = [
        {name: 'GitHub', url: 'https://github.com'},
        {name: 'Bilibili', url: 'https://www.bilibili.com'},
        {name: '淘宝', url: 'https://www.taobao.com/'},
        {name: '豆包', url: 'https://www.doubao.com/chat/'},
        {name: 'DeepSeek', url: 'https://chat.deepseek.com'},
        {name: '千问', url: 'https://www.qianwen.com/'},
        {name: '文心一言', url: 'https://yiyan.baidu.com/'},
        {name: '小游戏', url: 'https://www.msn.cn/zh-cn/play?cgfrom=cg_ntp_pivot'},
    ];

    if (Object.keys(tabGroups).length === 0 || (tabGroups['默认'] && tabGroups['默认'].length === 0)) {
        tabGroups = {'默认': [...defaultLinks]};
        localStorage.setItem('tabGroups', JSON.stringify(tabGroups));
    }

    function updateTime() {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('zh-CN', {hour12: false});
        const dateStr = now.toLocaleDateString('zh-CN', {year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'});
        document.getElementById('time').innerText = timeStr;
        document.getElementById('date').innerText = dateStr;
    }

    function search() {
        let query = document.getElementById('searchInput').value.trim();
        if (!query) return;
        let url = '';
        if (query.includes('.') && !query.includes(' ') && (query.startsWith('http') || !query.startsWith('https'))) {
            url = query.startsWith('http') ? query : 'https://' + query;
        } else {
            switch (currentEngine) {
                case 'bing':
                    url = 'https://cn.bing.com/search?q=' + encodeURIComponent(query);
                    break;
                case 'google':
                    url = 'https://www.google.com/search?q=' + encodeURIComponent(query);
                    break;
                case '360':
                    url = 'https://www.so.com/s?q=' + encodeURIComponent(query);
                    break;
                case 'baidu':
                    url = 'https://www.baidu.com/s?wd=' + encodeURIComponent(query);
                    break;
                case 'zhihu':
                    url = 'https://www.zhihu.com/search?q=' + encodeURIComponent(query);
                    break;
                case 'sougou':
                    url = 'https://www.sogou.com/sogou?query=' + encodeURIComponent(query);
                    break;
                default:
                    url = 'https://cn.bing.com/search?q=' + encodeURIComponent(query);
            }
        }
        window.location.href = url;
    }

    function setEngine(engine) {
        currentEngine = engine;
        localStorage.setItem('searchEngine', engine);
        document.querySelectorAll('.engine-btn').forEach(btn => {
            if (btn.dataset.engine === engine) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
    }

    function renderTabs() {
        const container = document.getElementById('tabsContainer');
        const tabNames = Object.keys(tabGroups);
        container.innerHTML = '';
        tabNames.forEach(name => {
            const btn = document.createElement('button');
            btn.className = 'tab-btn' + (currentTab === name ? ' active' : '');
            btn.innerHTML = `${name} <span class="delete-tab" data-tabname="${name}">✕</span>`;
            btn.onclick = (e) => {
                if (e.target.classList.contains('delete-tab')) return;
                switchTab(name);
            };
            container.appendChild(btn);
        });
        
        document.querySelectorAll('.delete-tab').forEach(delBtn => {
            delBtn.onclick = (e) => {
                e.stopPropagation();
                const tabName = delBtn.dataset.tabname;
                if (tabName === '默认') {
                    alert('默认分组不能删除');
                    return;
                }
                if (confirm(`确定删除分组「${tabName}」吗？`)) {
                    delete tabGroups[tabName];
                    if (currentTab === tabName) {
                        currentTab = '默认';
                        localStorage.setItem('currentTab', currentTab);
                    }
                    localStorage.setItem('tabGroups', JSON.stringify(tabGroups));
                    renderTabs();
                    renderShortcuts();
                }
            };
        });
        
        const addBtn = document.createElement('button');
        addBtn.className = 'add-tab';
        addBtn.textContent = '+ 新建分组';
        addBtn.onclick = addNewTab;
        container.appendChild(addBtn);
    }

    function switchTab(tabName) {
        currentTab = tabName;
        localStorage.setItem('currentTab', tabName);
        renderTabs();
        renderShortcuts();
    }

    function addNewTab() {
        let newName = prompt('输入新分组名称:', '新分组');
        if (newName && !tabGroups[newName]) {
            tabGroups[newName] = [];
            localStorage.setItem('tabGroups', JSON.stringify(tabGroups));
            switchTab(newName);
        } else if (tabGroups[newName]) {
            alert('分组已存在');
        }
    }

    function renderShortcuts() {
        const container = document.getElementById('panesContainer');
        const links = tabGroups[currentTab] || [];
        container.innerHTML = `
            <div class="shortcuts">
                ${links.map(link => `
                    <a href="${escapeHtml(link.url)}" class="shortcut" target="_blank">
                        <span class="shortcut-name">${escapeHtml(link.name)}</span>
                    </a>
                `).join('')}
            </div>
        `;
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function renderEditor() {
        const editor = document.getElementById('linksEditor');
        const links = tabGroups[currentTab] || [];
        editor.innerHTML = `
            ${links.map((link, idx) => `
                <div class="link-item" data-idx="${idx}">
                    <input type="text" placeholder="名称" value="${escapeHtml(link.name)}" class="link-name">
                    <input type="text" placeholder="网址" value="${escapeHtml(link.url)}" class="link-url">
                    <button class="delete-link" data-idx="${idx}">删除</button>
                </div>
            `).join('')}
            <button class="add-link" id="addLinkBtn">+ 添加链接</button>
        `;
        
        document.querySelectorAll('.delete-link').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.dataset.idx);
                const current = tabGroups[currentTab] || [];
                current.splice(idx, 1);
                tabGroups[currentTab] = current;
                renderEditor();
            });
        });
        
        document.querySelectorAll('.link-name, .link-url').forEach(input => {
            input.addEventListener('change', () => saveTempLinks());
        });
        
        document.getElementById('addLinkBtn').addEventListener('click', () => {
            const current = tabGroups[currentTab] || [];
            current.push({name: '新链接', url: 'https://'});
            tabGroups[currentTab] = current;
            renderEditor();
        });
    }
    
    function saveTempLinks() {
        const newLinks = [];
        const items = document.querySelectorAll('.link-item');
        items.forEach(item => {
            const name = item.querySelector('.link-name').value.trim();
            const url = item.querySelector('.link-url').value.trim();
            if (name && url) {
                newLinks.push({name, url});
            }
        });
        tabGroups[currentTab] = newLinks;
    }

    function openEditor() {
        renderEditor();
        document.getElementById('editModal').style.display = 'flex';
    }
    
    function closeEditor() {
        document.getElementById('editModal').style.display = 'none';
    }
    
    function saveLinks() {
        saveTempLinks();
        localStorage.setItem('tabGroups', JSON.stringify(tabGroups));
        renderShortcuts();
        closeEditor();
    }

    document.getElementById('searchBtn').addEventListener('click', search);
    document.getElementById('searchInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') search();
    });
    document.getElementById('editBtn').addEventListener('click', openEditor);
    document.getElementById('closeModalBtn').addEventListener('click', closeEditor);
    document.getElementById('saveLinksBtn').addEventListener('click', saveLinks);
    
    document.querySelectorAll('.engine-btn').forEach(btn => {
        btn.addEventListener('click', () => setEngine(btn.dataset.engine));
    });
    
    window.addEventListener('click', (e) => {
        if (e.target === document.getElementById('editModal')) {
            closeEditor();
        }
    });

    setEngine(currentEngine);
    renderTabs();
    renderShortcuts();
    updateTime();
    setInterval(updateTime, 1000);
</script>
</body>
</html>
